<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>癒やしの水槽</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="aquarium-app">
      <section id="aquarium" aria-label="水槽">
        <img id="tank-bg" src="./assets/tank-bg.svg" alt="水槽背景" />
        <canvas id="life-layer"></canvas>
        <div id="plant-layer" aria-hidden="true">
          <span class="plant p1"></span>
          <span class="plant p2"></span>
          <span class="plant p3"></span>
          <span class="plant p4"></span>
          <span class="plant p5"></span>
          <span class="plant p6"></span>
          <span class="plant p7"></span>
          <span class="plant p8"></span>
        </div>
        <canvas id="back-particles"></canvas>
        <div id="school-layer" aria-hidden="true"></div>
        <div id="fish-layer"></div>
        <canvas id="front-particles"></canvas>
        <div class="glass-highlight"></div>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
