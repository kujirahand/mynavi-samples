<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>idea-turbo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="grain"></div>
  <section id="start-screen" class="start-screen">
    <form id="title-form" class="start-card" autocomplete="off">
      <p class="start-kicker">idea-turbo</p>
      <h2>最初にタイトルを決めましょう</h2>
      <p>タイトルを作ると、専用のブレスト画面が始まります。</p>
      <input id="title-input" type="text" placeholder="例: 学園祭を盛り上げる新企画" required />
      <button type="submit">はじめる</button>
    </form>
  </section>

  <main id="app-shell" class="container hidden">
    <header class="header">
      <div class="badge">MODEL: {{ model_name }}</div>
      <h1 id="session-title">タイトルを入力してください</h1>
      <p class="desc">ひらめきを投げるたび、AIが全力で褒めます。</p>
    </header>

    <section id="chat" class="chat" aria-live="polite"></section>

    <form id="idea-form" class="idea-form" autocomplete="off">
      <textarea id="idea-input" placeholder="思いついたアイデアを書いて Enter で送信（Shift+Enterで改行）" rows="3" required></textarea>
      <button type="submit">送信</button>
    </form>
  </main>

  <div id="sakura-layer" class="sakura-layer" aria-hidden="true"></div>

  <script>
    window.APP_CONFIG = {
      idleSeconds: {{ idle_seconds }}
    };
  </script>
  <script src="/static/script.js"></script>
</body>
</html>
