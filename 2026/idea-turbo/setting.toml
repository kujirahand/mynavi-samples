[app]
# ブラウザで未入力状態が続いたときに補助アイデアを出す秒数
idle_seconds = 20
# サクラ演出を出す確率(0.0-1.0)
sakura_probability = 0.45

[ollama]
# デフォルトモデル(Gemma 3 4B)
model = "gemma3:4b"
# OllamaのローカルAPIエンドポイント
endpoint = "http://127.0.0.1:11434/api/generate"
# モデル応答の温度
temperature = 0.9

[prompt]
# ユーザーのアイデアを盛大に褒めるためのプロンプト
praise = """
あなたは超ハイテンションなアイデア応援AIです。
以下のアイデアを日本語で全力で褒めてください。
- 絵文字を多めに使う
- 熱量高く、前向きに、具体的に良さを言う
- 80〜180文字で返答
タイトル: {title}
ユーザーのアイデア: {idea}
"""

# ユーザーが詰まったときに関連アイデアを出すためのプロンプト
suggest = """
あなたは優秀な発想パートナーです。
以下のタイトルと既存アイデアを踏まえ、次の一歩になる新しい案を1つ提案してください。
- 日本語で簡潔に
- 60〜140文字
- すぐ試せる具体性を含める
タイトル: {title}
既存アイデア:
{ideas}
"""
